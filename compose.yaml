    environment:
      <<: *cc-env
      A2A_AGENT_ID: pm-ops
  demo-pm-ops:
    <<: *demo-agent
    environment:
      <<: *demo-env
      A2A_AGENT_ID: pm-ops
      A2A_SIGNING_KEY: /run/secrets/a2a/pm-ops.seed
      DEMO_ROLE: pm
      DEMO_PLANE: ops
      DEMO_WORKERS: worker-ops-1,worker-ops-2
      DEMO_CORE: core
      DEMO_TOPICS: ops
    depends_on:
      a2a-core:
        condition: service_healthy
      seed-planes:
        condition: service_completed_successfully
      onboard-demo-pm-ops:
        condition: service_completed_successfully
    healthcheck: *demo-presence-health

  # ---- Workers (2 per PM) ----------------------------------------------------------
  onboard-demo-worker-design-1:
    <<: *demo-onboard
    environment:
      <<: *cc-env
      A2A_AGENT_ID: worker-design-1
  demo-worker-design-1:
    <<: *demo-agent
    environment:
      <<: *demo-env
      A2A_AGENT_ID: worker-design-1
      A2A_SIGNING_KEY: /run/secrets/a2a/worker-design-1.seed
      DEMO_ROLE: worker
      DEMO_PLANE: design
      DEMO_PM: pm-design
      DEMO_TOPICS: design
    depends_on:
      a2a-core:
        condition: service_healthy
      seed-planes:
        condition: service_completed_successfully
      onboard-demo-worker-design-1:
        condition: service_completed_successfully
    healthcheck: *demo-presence-health

  onboard-demo-worker-design-2:
    <<: *demo-onboard
    environment:
      <<: *cc-env
      A2A_AGENT_ID: worker-design-2
  demo-worker-design-2:
    <<: *demo-agent
    environment:
      <<: *demo-env
      A2A_AGENT_ID: worker-design-2
      A2A_SIGNING_KEY: /run/secrets/a2a/worker-design-2.seed
      DEMO_ROLE: worker
      DEMO_PLANE: design
      DEMO_PM: pm-design
      DEMO_TOPICS: design
    depends_on:
      a2a-core:
        condition: service_healthy
      seed-planes:
        condition: service_completed_successfully
      onboard-demo-worker-design-2:
        condition: service_completed_successfully
    healthcheck: *demo-presence-health

  onboard-demo-worker-dev-1:
    <<: *demo-onboard
    environment:
      <<: *cc-env
      A2A_AGENT_ID: worker-dev-1
  demo-worker-dev-1:
    <<: *demo-agent
    environment:
      <<: *demo-env
      A2A_AGENT_ID: worker-dev-1
      A2A_SIGNING_KEY: /run/secrets/a2a/worker-dev-1.seed
      DEMO_ROLE: worker
      DEMO_PLANE: dev
      DEMO_PM: pm-dev
      DEMO_TOPICS: dev
    depends_on:
      a2a-core:
        condition: service_healthy
      seed-planes:
        condition: service_completed_successfully
      onboard-demo-worker-dev-1:
        condition: service_completed_successfully
    healthcheck: *demo-presence-health

  onboard-demo-worker-dev-2:
    <<: *demo-onboard
    environment:
