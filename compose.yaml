name: alloyium

x-cc-env: &cc-env
  NATS_URL: ${NATS_URL:-nats://nats:4222}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-a2a-core-run-bind: &a2a-core-run-bind
  type: bind
  source: ${A2A_CORE_RUN_HOST_PATH:-/run/a2a-core}
  target: /run/a2a-core
  bind:
    create_host_path: true

# Shared host<->agent workspace: operator drop-ins + where the agents git-clone. One dir,
# mounted at /workspace in every tool-capable agent; owned by the host user (CC_UID) so
# files cross the boundary cleanly. Default is repo-relative (inherits the data/ gitignore).
x-workspace-bind: &workspace-bind
  type: bind
  source: ${A2A_WORKSPACE_HOST_PATH:-./data/workspace}
  target: /workspace
  bind:
    create_host_path: true

# Single source of truth for the container user identity. CC_UID/CC_GID feed BOTH the
# runtime `user:` directive and the build-time uid remap (docker/lib/uidremap.sh), so the
# image's baked `bun` user matches the host user. Defaults to 1000 (upstream) when unset.
x-cc-build-args: &cc-build-args
  CC_UID: ${CC_UID:-1000}
  CC_GID: ${CC_GID:-1000}

# Shared build block for every service built from the generic bun image.
x-build-bun: &build-bun
  context: .
  dockerfile: docker/bun/Dockerfile
  args:
    <<: *cc-build-args

services:
  nats:
    # Core path (no profile = started by a plain `docker compose up`).
    image: nats:2.11-alpine
    command:
      - --jetstream
      - --store_dir
      - /data
      - --http_port
      - "8222"
    networks:
      - a2a-net
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null 'http://127.0.0.1:8222/healthz?js-enabled-only=true'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
    networks:
      - a2a-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  nats-lan-proxy:
    profiles: ["legacy-nats-proxy"]
    build:
      context: .
      dockerfile: docker/socat/Dockerfile
    command: ["socat", "-d", "-d", "TCP-LISTEN:4222,fork,reuseaddr", "TCP:nats:4222"]
    networks:
      - a2a-net
    ports:
      - "${A2A_REMOTE_BUS_BIND:-127.0.0.1}:${A2A_REMOTE_NATS_PORT:-4222}:4222"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  redis-lan-proxy:
    profiles: ["remote-bus"]
    build:
      context: .
      dockerfile: docker/socat/Dockerfile
    command: ["socat", "-d", "-d", "TCP-LISTEN:6379,fork,reuseaddr", "TCP:redis:6379"]
    networks:
      - a2a-net
    ports:
      - "${A2A_REMOTE_BUS_BIND:-127.0.0.1}:${A2A_REMOTE_REDIS_PORT:-16379}:6379"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s

  onboard-a2a-portal:
    # Core path: the one-shot that mints the portal's signing key before a2a-portal starts.
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts ${A2A_PORTAL_AGENT_ID:-a2a-portal} --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  a2a-portal:
    # Core path (no profile = up by default).
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
      A2A_PORTAL_PORT: "8900"
      A2A_PORTAL_STORE: /var/lib/alloyium/portal/a2a_portal.jsonl
      A2A_PORTAL_SEND_ENABLED: ${A2A_PORTAL_SEND_ENABLED:-1}
      A2A_PORTAL_AGENT_ID: ${A2A_PORTAL_AGENT_ID:-a2a-portal}
      A2A_PORTAL_HOST_OPS_CHAT_CWD: ${A2A_PORTAL_HOST_OPS_CHAT_CWD:-/app}
      A2A_PORTAL_CODEX_CHAT_CWD: ${A2A_PORTAL_CODEX_CHAT_CWD:-/app}
      A2A_PORTAL_ONE_OFF_CWD: ${A2A_PORTAL_ONE_OFF_CWD:-/tmp}
      A2A_PORTAL_KNOWN_HOSTS: ${A2A_PORTAL_KNOWN_HOSTS:-local,gpubox,srv01,homedevbox}
      A2A_PORTAL_HOST_ALIASES: ${A2A_PORTAL_HOST_ALIASES:-dev01=gpubox,devbox01=homedevbox}
      A2A_PORTAL_CONTAINER_HOST_FALLBACK: ${A2A_PORTAL_CONTAINER_HOST_FALLBACK:-local}
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${A2A_PORTAL_AGENT_ID:-a2a-portal}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${A2A_PORTAL_AGENT_ID:-a2a-portal}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
    networks:
      - a2a-net
    ports:
      - "${A2A_PORTAL_BIND:-127.0.0.1}:${A2A_PORTAL_HOST_PORT:-8901}:8900"
    volumes:
      - portal_logs:/var/lib/alloyium/portal
      - a2a_secrets:/run/secrets/a2a:ro
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      onboard-a2a-portal:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8900/api/channels >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    command:
      - sh
      - -lc
      - |
        mkdir -p /var/lib/alloyium/portal
        chown -R bun:bun /var/lib/alloyium/portal
        exec gosu bun:bun bun a2a_portal.ts

  onboard-codex-gw:
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts codex-gw --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  onboard-claude-gw:
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts claude-gw --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  materialize-kai-token:
    # Opt-in only (kai integration). Requires the excluded `materialize_kai_token.ts` and a
    # host vault-tokens file; NOT part of the core path. a2a-core degrades gracefully without it.
    profiles: ["gateways", "launcher", "kai"]
    build: *build-bun
    user: root
    environment:
      CC_UID: ${CC_UID:-1000}
      CC_GID: ${CC_GID:-1000}
    volumes:
      - kai_token_secret:/run/secrets
      - ${KAI_VAULT_TOKENS_FILE:-./secrets/vault-tokens.json}:/run/bootstrap-vault-tokens.json:ro
    restart: "no"
    command:
      - sh
      - -lc
      - |
        bun materialize_kai_token.ts \
          --tokens /run/bootstrap-vault-tokens.json \
          --out /run/secrets/kai-token \
          --uid "$${CC_UID}" \
          --gid "$${CC_GID}"

  a2a-core:
    # Core path (no profile = up by default).
    build:
      context: .
      dockerfile: docker/a2a-core/Dockerfile
      args:
        <<: *cc-build-args
    user: root
    environment:
      <<: *cc-env
      A2A_TRANSPORT_AUTH: none
      A2A_UDS_SOCKET_PATH: /run/a2a-core/core.sock
      A2A_INBOX_DB: /app/data/a2a-inbox.sqlite3
      A2A_CORE_BEAT_MS: ${A2A_CORE_BEAT_MS:-0}
      A2A_MCP_PENDING_INJECT_CAP: ${A2A_MCP_PENDING_INJECT_CAP:-256}
      A2A_UDS_MAX_CONNECTIONS: ${A2A_UDS_MAX_CONNECTIONS:-512}
      BRAIN_URL: ${BRAIN_URL:-}
      KAI_HTTP_URL: ${KAI_HTTP_URL:-}
      KAI_WS_URL: ${KAI_WS_URL:-}
      KAI_TOKEN_PATH: /run/secrets/kai-token
      A2A_AGENT_LAUNCH_ALLOWED_IDS: ${A2A_AGENT_LAUNCH_ALLOWED_IDS:-codex-gw}
      A2A_AGENT_LAUNCH_MODE: ${A2A_AGENT_LAUNCH_MODE:-shim}
      A2A_LAUNCHER_URL: ${A2A_LAUNCHER_URL:-}
    networks:
      - a2a-net
    volumes:
      - *a2a-core-run-bind
      - type: bind
        source: ${A2A_INBOX_HOST_PATH:-./data/a2a-inbox}
        target: /app/data
        bind:
          create_host_path: true
      - kai_token_secret:/run/secrets:ro
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      # NOTE: a2a-core deliberately does NOT hard-gate on materialize-kai-token
      # (no `condition: service_completed_successfully`) — P1 decouple (agent-1
      # mandate): the bus MUST start regardless of vault/materialize success.
      # Kai degrades, never the core. Materialize retry/backoff folds in later.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/a2a-core/core.sock && a2a-shim --ping /run/a2a-core/core.sock"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 10s
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/a2a-core /app/data
        chown -R bun:bun /run/a2a-core /app/data
        exec gosu bun:bun bun a2a_core.ts

  a2a-launcher:
    profiles: ["launcher"]
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
      A2A_LAUNCH_PROVIDER: docker
      A2A_LAUNCHER_PORT: "8910"
      # Bind all interfaces so codex-gw / a2a-core can reach the launcher cross-container.
      # a2a_launcher.ts defaults HOSTNAME to 127.0.0.1 (loopback) since 7dbaf00 ("launcher auth"),
      # which made the launch endpoint unreachable from other containers -> launch failures.
      A2A_LAUNCHER_HOST: ${A2A_LAUNCHER_HOST:-0.0.0.0}
      A2A_LAUNCH_ALLOWED_IDS: ${A2A_LAUNCH_ALLOWED_IDS:-codex-gw,claude-gw,agent-1,core,pm-design,pm-dev,pm-ops}
      A2A_LAUNCH_CODEX_IMAGE: ${A2A_LAUNCH_CODEX_IMAGE:-alloyium-codex-gw:latest}
      A2A_LAUNCH_CLAUDE_IMAGE: ${A2A_LAUNCH_CLAUDE_IMAGE:-alloyium-claude-gw:latest}
      A2A_LAUNCH_NETWORK: ${A2A_LAUNCH_NETWORK:-alloyium_a2a-net}
      A2A_LAUNCH_SECRETS_VOLUME: ${A2A_LAUNCH_SECRETS_VOLUME:-alloyium_a2a_secrets}
      A2A_LAUNCH_CORE_SOURCE: ${A2A_CORE_RUN_HOST_PATH:-/run/a2a-core}
      A2A_LAUNCH_WORKSPACES_VOLUME: ${A2A_LAUNCH_WORKSPACES_VOLUME:-alloyium_codex_workspaces}
      A2A_LAUNCH_PROJECT_DIR: ${A2A_LAUNCH_PROJECT_DIR:-${PWD:-.}}
      A2A_LAUNCH_WORKSPACE_HOST_PATH: ${A2A_LAUNCH_WORKSPACE_HOST_PATH:-${A2A_WORKSPACE_HOST_PATH:-./data/workspace}}
      A2A_LAUNCH_WORKSPACE_CONTAINER_PATH: ${A2A_LAUNCH_WORKSPACE_CONTAINER_PATH:-/workspace}
      A2A_LAUNCH_PRESENCE_WAIT_MS: ${A2A_LAUNCH_PRESENCE_WAIT_MS:-15000}
      CODEX_HOST_HOME: ${CODEX_HOST_HOME:-${HOME}/.codex}
      CODEX_WORKSPACE_ROOT: ${CODEX_WORKSPACE_ROOT:-${HOME}/git}
      CODEX_GW_ALLOW_WRITE: ${CODEX_GW_ALLOW_WRITE:-1}
      CODEX_GW_WRITE_ALLOWLIST: ${CODEX_GW_WRITE_ALLOWLIST:-dev-pm}
      CODEX_GW_CODEX_SANDBOX: ${CODEX_GW_CODEX_SANDBOX:-danger-full-access}
      CODEX_BUILD_CWD_ROOTS: ${CODEX_BUILD_CWD_ROOTS:-/workspace,${HOME}/git}
      # Spawned kind=claude workers need the HOST paths of the logged-in `claude` session
      # to bind in (mirrors CODEX_HOST_HOME). Claude's login is split across a dir and a
      # file, so pass BOTH: ~/.claude (dir) and ~/.claude.json (file). Default to ${HOME}.
      CLAUDE_HOST_HOME: ${CLAUDE_HOST_HOME:-${HOME}/.claude}
      CLAUDE_HOST_CONFIG: ${CLAUDE_HOST_CONFIG:-${HOME}/.claude.json}
      CLAUDE_GW_MODEL: ${CLAUDE_GW_MODEL:-opus}
      CLAUDE_GW_EFFORT: ${CLAUDE_GW_EFFORT:-high}
      BRAIN_URL: ${BRAIN_URL:-}
      KAI_HTTP_URL: ${KAI_HTTP_URL:-}
      KAI_WS_URL: ${KAI_WS_URL:-}
      KAI_TOKEN_PATH: ${KAI_TOKEN_PATH:-}
      CC_UID: ${CC_UID:-1000}
      CC_GID: ${CC_GID:-1000}
    networks:
      - a2a-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8910/readyz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    command: ["bun", "a2a_launcher.ts"]

  taskboard-event-bridge:
    profiles: ["taskboard"]
    build: *build-bun
    environment:
      <<: *cc-env
      TASKBOARD_URL: ${TASKBOARD_URL:-}
      TASKBOARD_EVENT_BRIDGE_PORT: "18889"
      TASKBOARD_EVENT_BRIDGE_HMAC_SECRET: ${TASKBOARD_EVENT_BRIDGE_HMAC_SECRET:-}
      TASKBOARD_EVENT_BRIDGE_HMAC_SECRET_FILE: ${TASKBOARD_EVENT_BRIDGE_HMAC_SECRET_FILE:-}
      TASKBOARD_EVENT_PUBLISH_TIMEOUT_MS: ${TASKBOARD_EVENT_PUBLISH_TIMEOUT_MS:-10000}
    networks:
      - a2a-net
    ports:
      - "${TASKBOARD_EVENT_BRIDGE_BIND:-127.0.0.1}:${TASKBOARD_EVENT_BRIDGE_HOST_PORT:-18889}:18889"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:18889/readyz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    command: ["bun", "taskboard_event_bridge.ts"]

  onboard-taskboard-dispatcher:
    profiles: ["taskboard"]
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts ${TASKBOARD_DISPATCH_AGENT_ID:-taskboard-dispatcher} --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  a2a-taskboard-dispatcher:
    profiles: ["taskboard"]
    build: *build-bun
    # Optional review-token overrides; absent file is fine (service reads tokens from env instead).
    env_file:
      - path: ${TASKBOARD_REVIEW_TOKENS_ENV:-./secrets/taskboard-review-tokens.env}
        required: false
    environment:
      <<: *cc-env
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${TASKBOARD_DISPATCH_AGENT_ID:-taskboard-dispatcher}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${TASKBOARD_DISPATCH_AGENT_ID:-taskboard-dispatcher}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
      TASKBOARD_URL: ${TASKBOARD_URL:-}
      TASKBOARD_API_TOKEN: ${TASKBOARD_API_TOKEN:-}
      TASKBOARD_DISPATCH_DEFAULT_AGENT_ID: ${TASKBOARD_DISPATCH_DEFAULT_AGENT_ID:-host-ops-gw}
      TASKBOARD_DISPATCH_DEFAULT_CWD: ${TASKBOARD_DISPATCH_DEFAULT_CWD:-/app}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
    depends_on:
      redis:
        condition: service_healthy
      onboard-taskboard-dispatcher:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s
    command: ["bun", "taskboard_event_dispatcher.ts"]

  codex-gw:
    build:
      context: .
      dockerfile: docker/gateway-codex/Dockerfile
      args:
        <<: *cc-build-args
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.141.0}
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      HOME: /home/bun
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${CODEX_GW_AGENT_ID:-codex-gw}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${CODEX_GW_AGENT_ID:-codex-gw}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
      CODEX_GW_EFFORT: ${CODEX_GW_EFFORT:-xhigh}
      CODEX_GW_MODEL: ${CODEX_GW_MODEL:-}
      CODEX_GW_BUDGET_MAX_PCT: ${CODEX_GW_BUDGET_MAX_PCT:-92}
      CODEX_GW_ALLOW_WRITE: ${CODEX_GW_ALLOW_WRITE:-1}
      CODEX_GW_WRITE_ALLOWLIST: ${CODEX_GW_WRITE_ALLOWLIST:-dev-pm}
      CODEX_GW_CODEX_SANDBOX: ${CODEX_GW_CODEX_SANDBOX:-danger-full-access}
      # Authorize codex workspace-write jobs to land in the shared /workspace (plus legacy ~/git).
      CODEX_BUILD_CWD_ROOTS: ${CODEX_BUILD_CWD_ROOTS:-/workspace,${HOME}/git}
      CODEX_GW_ENABLE_A2A_TOOLS: ${CODEX_GW_ENABLE_A2A_TOOLS:-1}
      CODEX_GW_A2A_TOOLS_MODE: ${CODEX_GW_A2A_TOOLS_MODE:-shim}
      CODEX_GW_A2A_SHIM_BIN: /usr/local/bin/a2a-shim
      CODEX_GW_A2A_TOOLS_REQUIRED: ${CODEX_GW_A2A_TOOLS_REQUIRED:-1}
      A2A_CORE_SOCK: /run/a2a-core/core.sock
      # codex-gw's launch tool (agent_launcher_tools) needs the launcher URL to spawn A2A peers;
      # without it codex-gw can't forward a2a.launch.request -> launch failures.
      A2A_LAUNCHER_URL: ${A2A_LAUNCHER_URL:-http://a2a-launcher:8910}
      BRAIN_URL: ${BRAIN_URL:-}
      KAI_HTTP_URL: ${KAI_HTTP_URL:-}
      KAI_WS_URL: ${KAI_WS_URL:-}
      KAI_TOKEN_PATH: ${KAI_TOKEN_PATH:-}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
      - *a2a-core-run-bind
      - ${CODEX_HOST_HOME:-${HOME}/.codex}:/home/bun/.codex
      # Optional: mount the user's own SSH keys so codex can push to their git remotes.
      # Override CODEX_SSH_DIR in .env; defaults to the host user's ~/.ssh.
      - ${CODEX_SSH_DIR:-${HOME}/.ssh}:/home/bun/.ssh:ro
      - ${CODEX_WORKSPACE_ROOT:-${HOME}/git}:${CODEX_WORKSPACE_ROOT:-${HOME}/git}
      - codex_workspaces:/workspaces
      - *workspace-bind
    depends_on:
      redis:
        condition: service_healthy
      onboard-codex-gw:
        condition: service_completed_successfully
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s
    command: ["bun", "codex_gateway.ts"]

  claude-gw:
    build:
      context: .
      dockerfile: docker/gateway-claude/Dockerfile
      args:
        <<: *cc-build-args
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-2.1.191}
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      HOME: /home/bun
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${CLAUDE_GW_AGENT_ID:-claude-gw}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${CLAUDE_GW_AGENT_ID:-claude-gw}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
      # claude_gateway.ts knobs (drives the logged-in `claude` CLI; advisory-only, --tools "").
      # Never pass an empty model: `${VAR:-default}` substitutes the default when unset OR empty.
      CLAUDE_GW_MODEL: ${CLAUDE_GW_MODEL:-opus}
      CLAUDE_GW_EFFORT: ${CLAUDE_GW_EFFORT:-high}
      CLAUDE_GW_CWD: ${CLAUDE_GW_CWD:-/tmp}
      CLAUDE_GW_POOL: ${CLAUDE_GW_POOL:-2}
      CLAUDE_GW_SESSION_MAX_TURNS: ${CLAUDE_GW_SESSION_MAX_TURNS:-1}
      CLAUDE_GW_THREAD_MAX_TURNS: ${CLAUDE_GW_THREAD_MAX_TURNS:-200}
      CLAUDE_GW_TURN_TIMEOUT_MS: ${CLAUDE_GW_TURN_TIMEOUT_MS:-28800000}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
      # The user's logged-in `claude` session: the CLI keeps its login under ~/.claude
      # (dir) plus ~/.claude.json (file) — mount BOTH read-write so OAuth tokens refresh.
      # Override CLAUDE_HOST_HOME / CLAUDE_HOST_CONFIG in .env; default to the host user's home.
      - ${CLAUDE_HOST_HOME:-${HOME}/.claude}:/home/bun/.claude
      - ${CLAUDE_HOST_CONFIG:-${HOME}/.claude.json}:/home/bun/.claude.json
      # Optional: mount the user's own SSH keys (read-only), mirroring the codex gateway.
      - ${CLAUDE_SSH_DIR:-${HOME}/.ssh}:/home/bun/.ssh:ro
    depends_on:
      redis:
        condition: service_healthy
      onboard-claude-gw:
        condition: service_completed_successfully
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s
    command: ["bun", "claude_gateway.ts"]

  onboard-claude-agent:
    # One-shot: mint the conversational Claude agent's signing seed before it starts.
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts ${CLAUDE_AGENT_ID:-claude-agent} --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  claude-agent:
    # A FIRST-CLASS conversational Claude peer — distinct from claude-gw (the inference
    # gateway). A real `claude` session wired to the a2a-shim (UDS -> shared a2a-core), so
    # the model HOLDS the a2a tools and RECEIVES channel injection in-session and talks to
    # other agents. Default-on, like the gateways; drives the user's logged-in OAuth session.
    build:
      context: .
      dockerfile: docker/agent-claude/Dockerfile
      args:
        <<: *cc-build-args
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-2.1.191}
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      HOME: /home/bun
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${CLAUDE_AGENT_ID:-claude-agent}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${CLAUDE_AGENT_ID:-claude-agent}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_CORE_SOCK: /run/a2a-core/core.sock
      A2A_SHIM_BIN: /usr/local/bin/a2a-shim
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-opus}
      CLAUDE_AGENT_EFFORT: ${CLAUDE_AGENT_EFFORT:-high}
      # Run the session in the shared workspace so bare `git clone`s land on the host.
      CLAUDE_AGENT_CWD: ${CLAUDE_AGENT_CWD:-/workspace}
      BRAIN_URL: ${BRAIN_URL:-}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
      - *a2a-core-run-bind
      # The user's logged-in `claude` session (dir + json) — mounted read-write so OAuth
      # tokens refresh, identical to claude-gw. Override CLAUDE_HOST_HOME / CLAUDE_HOST_CONFIG.
      - ${CLAUDE_HOST_HOME:-${HOME}/.claude}:/home/bun/.claude
      - ${CLAUDE_HOST_CONFIG:-${HOME}/.claude.json}:/home/bun/.claude.json
      - ${CLAUDE_SSH_DIR:-${HOME}/.ssh}:/home/bun/.ssh:ro
      - *workspace-bind
    depends_on:
      redis:
        condition: service_healthy
      onboard-claude-agent:
        condition: service_completed_successfully
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 24
      start_period: 60s

  onboard-claude-agent-b:
    # `fleet` profile: mint a 2nd conversational Claude identity (for claude<->claude).
    profiles: ["fleet"]
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts claude-agent-b --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  claude-agent-b:
    # `fleet` profile: a 2nd conversational Claude peer — same image/wiring as
    # claude-agent, distinct identity. `docker compose --profile fleet up` to watch
    # claude<->claude in real time.
    profiles: ["fleet"]
    build:
      context: .
      dockerfile: docker/agent-claude/Dockerfile
      args:
        <<: *cc-build-args
        CLAUDE_CLI_VERSION: ${CLAUDE_CLI_VERSION:-2.1.191}
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      HOME: /home/bun
      A2A_ENABLED: "1"
      A2A_AGENT_ID: claude-agent-b
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/claude-agent-b.seed
      A2A_TRANSPORT_AUTH: none
      A2A_CORE_SOCK: /run/a2a-core/core.sock
      A2A_SHIM_BIN: /usr/local/bin/a2a-shim
      CLAUDE_AGENT_MODEL: ${CLAUDE_AGENT_MODEL:-opus}
      CLAUDE_AGENT_EFFORT: ${CLAUDE_AGENT_EFFORT:-high}
      # Run the session in the shared workspace so bare `git clone`s land on the host.
      CLAUDE_AGENT_CWD: ${CLAUDE_AGENT_CWD:-/workspace}
      BRAIN_URL: ${BRAIN_URL:-}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
      - *a2a-core-run-bind
      - ${CLAUDE_HOST_HOME:-${HOME}/.claude}:/home/bun/.claude
      - ${CLAUDE_HOST_CONFIG:-${HOME}/.claude.json}:/home/bun/.claude.json
      - ${CLAUDE_SSH_DIR:-${HOME}/.ssh}:/home/bun/.ssh:ro
      - *workspace-bind
    depends_on:
      redis:
        condition: service_healthy
      onboard-claude-agent-b:
        condition: service_completed_successfully
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 24
      start_period: 60s

  onboard-codex-gw-b:
    # `fleet` profile: mint a 2nd codex identity (for codex<->codex).
    profiles: ["fleet"]
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts codex-gw-b --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  codex-gw-b:
    # `fleet` profile: a 2nd codex peer — same image/wiring as codex-gw, distinct
    # identity, read-only. For codex<->codex (and a fuller fleet).
    profiles: ["fleet"]
    build:
      context: .
      dockerfile: docker/gateway-codex/Dockerfile
      args:
        <<: *cc-build-args
        CODEX_CLI_VERSION: ${CODEX_CLI_VERSION:-0.141.0}
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      HOME: /home/bun
      A2A_ENABLED: "1"
      A2A_AGENT_ID: codex-gw-b
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/codex-gw-b.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
      CODEX_GW_EFFORT: ${CODEX_GW_EFFORT:-xhigh}
      CODEX_GW_MODEL: ${CODEX_GW_MODEL:-}
      CODEX_GW_BUDGET_MAX_PCT: ${CODEX_GW_BUDGET_MAX_PCT:-92}
      CODEX_GW_ALLOW_WRITE: "0"
      CODEX_GW_ENABLE_A2A_TOOLS: ${CODEX_GW_ENABLE_A2A_TOOLS:-1}
      CODEX_GW_A2A_TOOLS_MODE: ${CODEX_GW_A2A_TOOLS_MODE:-shim}
      CODEX_GW_A2A_SHIM_BIN: /usr/local/bin/a2a-shim
      CODEX_GW_A2A_TOOLS_REQUIRED: ${CODEX_GW_A2A_TOOLS_REQUIRED:-1}
      A2A_CORE_SOCK: /run/a2a-core/core.sock
      BRAIN_URL: ${BRAIN_URL:-}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
      - *a2a-core-run-bind
      - ${CODEX_HOST_HOME:-${HOME}/.codex}:/home/bun/.codex
      - ${CODEX_SSH_DIR:-${HOME}/.ssh}:/home/bun/.ssh:ro
      - codex_workspaces:/workspaces
      - *workspace-bind
    depends_on:
      redis:
        condition: service_healthy
      onboard-codex-gw-b:
        condition: service_completed_successfully
      a2a-core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 20s
    command: ["bun", "codex_gateway.ts"]

  onboard-alloyium-cortex:
    # `fusion` profile: mint the alloyium-cortex identity.
    profiles: ["fusion"]
    build: *build-bun
    user: root
    environment:
      <<: *cc-env
      ALLOYIUM_CORTEX_AGENT_ID: ${ALLOYIUM_CORTEX_AGENT_ID:-${FUSION_SVC_AGENT_ID:-alloyium-cortex}}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"
    command:
      - sh
      - -lc
      - |
        mkdir -p /run/secrets/a2a
        chown -R bun:bun /run/secrets/a2a
        exec su bun -s /bin/sh -c 'bun onboard.ts "$${ALLOYIUM_CORTEX_AGENT_ID}" --transport none --dir /run/secrets/a2a --redis redis://redis:6379 --nats "$${NATS_URL}"'

  alloyium-cortex:
    # `fusion` profile: the cross-model panel. Dispatches a prompt to claude-gw (Opus) +
    # codex-gw (GPT-5.5) in parallel over the bus, then an Opus judge synthesizes one
    # answer. Joins the bus directly (like the portal). Needs both gateways up.
    profiles: ["fusion"]
    build: *build-bun
    user: "${CC_UID:-1000}:${CC_GID:-1000}"
    environment:
      <<: *cc-env
      ALLOYIUM_CORTEX_AGENT_ID: ${ALLOYIUM_CORTEX_AGENT_ID:-${FUSION_SVC_AGENT_ID:-alloyium-cortex}}
      A2A_ENABLED: "1"
      A2A_AGENT_ID: ${ALLOYIUM_CORTEX_AGENT_ID:-${FUSION_SVC_AGENT_ID:-alloyium-cortex}}
      A2A_SIG_ALG: ed25519
      A2A_SIGNING_KEY: /run/secrets/a2a/${ALLOYIUM_CORTEX_AGENT_ID:-${FUSION_SVC_AGENT_ID:-alloyium-cortex}}.seed
      A2A_TRANSPORT_AUTH: none
      A2A_MAX_SEND_BYTES: ${A2A_MAX_SEND_BYTES:-8192}
      CODEX_GW_ID: ${CODEX_GW_AGENT_ID:-codex-gw}
      CLAUDE_GW_ID: ${CLAUDE_GW_AGENT_ID:-claude-gw}
    networks:
      - a2a-net
    volumes:
      - a2a_secrets:/run/secrets/a2a:ro
    depends_on:
      redis:
        condition: service_healthy
      onboard-alloyium-cortex:
        condition: service_completed_successfully
      claude-gw:
        condition: service_healthy
      codex-gw:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u \"$${REDIS_URL}\" GET \"alloyium:a2a:presence:$${A2A_AGENT_ID}\" | grep -q ."]
      interval: 10s
      timeout: 3s
      retries: 18
      start_period: 15s
    command: ["bun", "fusion_service.ts"]

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: docker/test/Dockerfile
      args:
        <<: *cc-build-args
    environment:
      <<: *cc-env
      A2A_TEST_REQUIRE_BUS: ${A2A_TEST_REQUIRE_BUS:-}
    networks:
      - a2a-net
    depends_on:
      redis:
        condition: service_healthy
    command: ["bun", "run", "selftest"]

  brain:
    # Alloyium Agent Brain Notepad — shared memory + skills store backing the a2a
    # brain tools (a2a_remember/recall/skill_*). Without it, brain_tools.ts gets an
    # empty BRAIN_URL and fails fetch("") -> "brain_unavailable: fetch() URL is invalid".
    # Source: github.com/Alloyium-ai/alloyium-brain (cloned in data/workspace/alloyium-brain).
    image: alloyium-brain:local
    build:
      context: ./data/workspace/alloyium-brain
    environment:
      # Optional bearer token for the agent API; unset = open within a2a-net + localhost only.
      BRAIN_API_TOKEN: ${BRAIN_API_TOKEN:-}
      # Real neural embeddings via the `tei` service (BAAI/bge-m3, 1024-dim). Falls back
      # to the local hash backend if tei is unreachable (FALLBACK_LOCAL default on).
      BRAIN_EMBEDDING_BASE_URL: ${BRAIN_EMBEDDING_BASE_URL:-http://tei:80}
      BRAIN_EMBEDDING_MODEL: ${BRAIN_EMBEDDING_MODEL:-BAAI/bge-m3}
    networks:
      - a2a-net
    ports:
      # host-only publish for the operator web UI / debugging; not exposed on the LAN.
      - "127.0.0.1:8787:8787"
    volumes:
      - brain_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8787/api/health').getcode()==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  tei:
    # Embedding server (HF Text Embeddings Inference) serving BAAI/bge-m3 for the
    # brain's semantic search; the brain reaches it at http://tei:80 (/v1/embeddings).
    # Default = CPU image (portable, no VRAM) — chosen because the 8GB GPU is consumed
    # by the desktop session. Same model+dims as the GPU path, so switching needs NO reembed.
    # To run on GPU instead (needs ~2.5GB free VRAM + nvidia-container-toolkit): set
    #   TEI_IMAGE=ghcr.io/huggingface/text-embeddings-inference:89-1.7   (Ada/sm_89, RTX 40-series)
    # in .env and uncomment the `deploy:` GPU reservation below.
    image: ${TEI_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.7}
    command: ["--model-id", "${TEI_MODEL:-BAAI/bge-m3}", "--port", "80"]
    environment:
      HF_HOME: /data
    networks:
      - a2a-net
    ports:
      # host-only publish for debugging the embedding API.
      - "127.0.0.1:8788:80"
    volumes:
      - tei_data:/data
    # --- GPU path (uncomment when VRAM is free; pair with the Ada TEI_IMAGE above) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

networks:
  # Docker auto-assigns a free subnet so the stack can run standalone alongside
  # other compose projects without address-pool overlap.
  a2a-net:

volumes:
  nats_data:
  redis_data:
  a2a_secrets:
  kai_token_secret:
  portal_logs:
  codex_workspaces:
  brain_data:
  tei_data:
